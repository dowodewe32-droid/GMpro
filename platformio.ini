[platformio]
default_envs = esp12e
src_dir = .

[env:esp12e]
# Menggunakan core lama yang stabil untuk WifiX/Deauther
platform = espressif8266@2.6.3
board = esp12e
framework = arduino

# Pencarian library mendalam
lib_ldf_mode = deep+

build_flags = 
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -fpermissive
    -w

# JURUS SAKTI: Abaikan file repeater yang menyebabkan error dhcpserver & linkage
# Fitur repeater tidak wajib, yang penting Scan & Attack jalan.
build_src_filter = +<*> -<repeater.*>
