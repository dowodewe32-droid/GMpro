[platformio]
default_envs = esp12e
src_dir = .

[env:esp12e]
platform = espressif8266
board = esp12e
framework = arduino

# Menambahkan path pencarian library agar dhcpserver.h ketemu
build_flags = 
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -Wl,-Teagle.flash.4m1m.ld
    -Iinclude
    -Isrc

# Memaksa PlatformIO mencari library di folder internal core
lib_ldf_mode = deep+
