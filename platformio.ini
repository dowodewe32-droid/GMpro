[platformio]
default_envs = esp12e
src_dir = .

[env:esp12e]
# Menggunakan platform versi lama yang lebih kompatibel dengan dhcpserver.h
platform = espressif8266@2.6.3
board = esp12e
framework = arduino

# Memaksa pencarian library secara mendalam
lib_ldf_mode = deep+

build_flags = 
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -I.
    -Isrc
    # Tambahkan baris ini jika dhcpserver ada di folder internal
    -Wl,-Teagle.flash.4m1m.ld

# Menghindari error jika ada library yang duplikat
lib_ignore = 
    ESP8266WiFiMesh
