[platformio]
# Menetapkan environment default
default_envs = esp12e
# Memberitahu PlatformIO bahwa file .ino dan src ada di folder utama
src_dir = .

[env:esp12e]
# Menggunakan core ESP8266 versi 2.6.3 yang paling stabil untuk kodingan WifiX/Deauther
platform = espressif8266@2.6.3
board = esp12e
framework = arduino

# Mode LDF 'deep+' penting agar PlatformIO bisa menemukan dhcpserver.h di dalam folder sistem
lib_ldf_mode = deep+

build_flags = 
    # Menggunakan memory LWIP rendah agar stabil saat attack
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    # Mengaktifkan fitur NAPT untuk Repeater
    -D LWIP_FEATURES=1
    -D LWIP_IPV6=0
    # Mengabaikan error tipe data yang tidak ketat (penting untuk kodingan lama)
    -fpermissive
    # Menyembunyikan peringatan (warning) agar log build bersih
    -w
    # Folder include
    -I.

# Pastikan fitur repeater tidak di-exclude (jangan ada baris build_src_filter yang melarang repeater)
