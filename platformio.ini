[platformio]
default_envs = esp12e
src_dir = .

[env:esp12e]
platform = espressif8266@2.6.3
board = esp12e
framework = arduino
lib_ldf_mode = deep+

# Kita tambahkan flag untuk menekan eror template
build_flags = 
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -I.
    -Isrc
    -fpermissive
    -w # Ini akan menyembunyikan semua Warning agar log tidak terlalu panjang

# Jika repeater.cpp tetap eror, kita abaikan saja filenya agar file .bin tetap jadi
build_src_filter = +<*> -<repeater.cpp> -<repeater.h>
