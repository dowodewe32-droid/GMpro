; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp12e
src_dir = .

[env:esp12e]
platform = espressif8266
board = esp12e
framework = arduino
upload_speed = 460800
lib_ldf_mode = deep+
lib_deps = 
	adafruit/Adafruit NeoPixel
build_flags = 
	-D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
	-D LWIP_FEATURES=1
	-fpermissive
	-w
	-I.
	-isystem /usr/lib/xtensa-lx106-elf/include
	-isystem /usr/lib/xtensa-lx106-elf/include/xtensa
board_build.toolchain.prefix = xtensa-lx106-elf-
board_build.toolchain.cc = /usr/bin/xtensa-lx106-elf-gcc
board_build.toolchain.cxx = /usr/bin/xtensa-lx106-elf-g++
board_build.toolchain.ar = /usr/bin/xtensa-lx106-elf-ar
board_build.toolchain.ld = /usr/bin/xtensa-lx106-elf-ld
board_build.toolchain.objcopy = /usr/bin/xtensa-lx106-elf-objcopy
